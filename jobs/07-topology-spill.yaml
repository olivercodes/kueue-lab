# Job 7 — preferred topology, the softer cousin of job 2.
#
# Ten GPUs, with one difference from job 2 — the annotation:
#
#     kueue.x-k8s.io/podset-preferred-topology: lab.gpu/rack
#
# "preferred" means keep the pods in one rack if you can, but don't block on it.
# Run the fragmenter (job 7a) first: it leaves one node busy in each rack, so
# each rack has only 8 GPUs free. A 10-GPU job no longer fits any single rack,
# but 16 are free across the cluster — so this job spills across both racks and
# starts, instead of waiting.
#
# Compare to job 2's "required": in the same spot, required would sit waiting
# until a whole rack opened up. Preferred trades locality for starting sooner —
# the right call when a job can tolerate a slower link between some of its pods.
#
# See it spill:
#   kubectl apply -f jobs/07a-fragmenter.yaml      # busy one node per rack
#   kubectl apply -f jobs/07-topology-spill.yaml   # 10 GPU — spills across racks
apiVersion: batch/v1
kind: Job
metadata:
  name: topo-spill
  namespace: default
  labels:
    kueue.x-k8s.io/queue-name: team-a
spec:
  parallelism: 10
  completions: 10
  suspend: true
  backoffLimit: 0
  completionMode: Indexed
  template:
    metadata:
      annotations:
        # prefer one rack, but allow spilling across racks rather than waiting
        kueue.x-k8s.io/podset-preferred-topology: "lab.gpu/rack"
    spec:
      restartPolicy: Never
      containers:
        - name: worker
          image: busybox:1.36
          command: ["sh", "-c", "echo \"spill rank $JOB_COMPLETION_INDEX on $(hostname)\"; sleep 90"]
          env:
            - name: JOB_COMPLETION_INDEX
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['batch.kubernetes.io/job-completion-index']
          resources:
            requests:
              cpu: "250m"   # small on purpose: GPU is the only resource that gates admission
              memory: "256Mi"
              nvidia.com/gpu: "1"
            limits:
              nvidia.com/gpu: "1"
