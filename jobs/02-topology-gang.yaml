# Job 2 — a gang job that has to stay topology-close.
#
# Eight pods, one GPU each: an 8-GPU distributed training job, the size of one
# full HGX H100 node. Two things to watch:
#
#  1. Gang admission. Kueue admits the whole job at once or not at all — it
#     won't start 5 of the 8 pods and strand them. All eight GPUs have to be
#     free in the pool before anything runs.
#
#  2. Required topology. This annotation —
#        kueue.x-k8s.io/podset-required-topology: lab.gpu/rack
#     tells Kueue to keep every pod in the set inside one rack. A rack is a
#     single NVLink domain, and for distributed training you want the GPUs
#     talking over the fast intra-rack fabric rather than the slower link
#     between racks. Each rack holds 2 nodes x 8 = 16 GPUs, so 8 fits easily.
#
#     Swap it for ...preferred-topology to get "close if you can, but don't
#     block on it" instead.
#
# Submit:  kubectl apply -f jobs/02-topology-gang.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: topo-gang
  namespace: default
  labels:
    kueue.x-k8s.io/queue-name: team-a
spec:
  parallelism: 8
  completions: 8
  suspend: true
  backoffLimit: 0
  completionMode: Indexed
  template:
    metadata:
      annotations:
        # keep every pod in this set inside one rack (one NVLink domain)
        kueue.x-k8s.io/podset-required-topology: "lab.gpu/rack"
    spec:
      restartPolicy: Never
      containers:
        - name: worker
          image: busybox:1.36
          command: ["sh", "-c", "echo \"rank $JOB_COMPLETION_INDEX on $(hostname)\"; sleep 90"]
          env:
            - name: JOB_COMPLETION_INDEX
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['batch.kubernetes.io/job-completion-index']
          resources:
            requests:
              cpu: "250m"   # small on purpose: GPU is the only resource that gates admission
              memory: "256Mi"
              nvidia.com/gpu: "1"
            limits:
              nvidia.com/gpu: "1"
